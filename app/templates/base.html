<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MyShop - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles/products.css">
    <link rel="icon" href="/static/images/icons/icon.ico" type="image/x-icon">
</head>
<body>
    <header class="header">
    <div class="logo">
        <img src="/static/images/icons/icon.png" alt="Логотип" class="logo-img">
        MyShop
    </div>

    <div class="user-block">
        <span class="user-name">{{ full_name }} ({{ user_role }})</span>
        <button id="logout-btn" class="logout-btn">Выйти</button>
    </div>
    </header>

{% block content %}{% endblock %}

</body>
<script type="module" src="/static/scripts/ui/productsPageUi.js"></script>
</html>
